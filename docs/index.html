<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quantum Well">
    <title>Quantum Well</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            /* The simulation runs at 200x200, but we scale it up to 400x400 visually */
            width: 400px;
            height: 400px;
            background-color: #111;
            border-radius: 50%;
            /* touch-action: none prevents the browser from scrolling when dragging on the canvas */
            touch-action: none;
            -webkit-user-select: none;
            /* Safari */
            user-select: none;
            /* Standard syntax */

            /* Prevents the callout menu (copy/define) on long press */
            -webkit-touch-callout: none;

            /* Optional: Removes the highlight color when tapped */
            -webkit-tap-highlight-color: transparent;
        }

        /* FPS Counter Styling */
        #fpsCounter {
            display: none;
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="fpsCounter">FPS: 0</div>

    <canvas id="quantumCanvas" width="200" height="200"></canvas>

    <script src="main.js"></script>

    <script>
        Module.onRuntimeInitialized = function () {
            console.log("WASM Module Loaded.");

            const gridSize = 200;
            const canvas = document.getElementById('quantumCanvas');
            const ctx = canvas.getContext('2d');
            const fpsCounterElement = document.getElementById('fpsCounter');

            const well = new Module.CircularQuantumWell(gridSize, 1.0);

            // Load a large basis set of empty states
            for (let l = -8; l <= 8; l++) {
                for (let n = 1; n <= 8; n++) {
                    well.addState(l, n, 0.0, 0.0);
                }
            }

            // --- Wavepacket Interaction State ---
            let isTapping = false;
            let tapStartTime = 0;
            let pointerCanvasX = 0; // Coordinates mapped to [0, 200]
            let pointerCanvasY = 0;
            let pointerPhysicalX = 0; // Coordinates mapped to [-1.0, 1.0]
            let pointerPhysicalY = 0;

            const MIN_SIGMA = 0.10; // Quick tap size
            const MAX_SIGMA = 0.20; // Max hold size
            const SIGMA_GROWTH_RATE = 0.05; // How fast sigma grows per second

            // 1. Pointer Down (Start Charging)
            canvas.addEventListener('pointerdown', function (event) {
                // Ignore right-clicks
                if (event.button !== 0 && event.pointerType === 'mouse') return;

                const rect = canvas.getBoundingClientRect();
                const cssX = event.clientX - rect.left;
                const cssY = event.clientY - rect.top;

                // Map CSS [0, 400] to Physical [-1.0, 1.0]
                pointerPhysicalX = (cssX / 400.0) * 2.0 - 1.0;
                pointerPhysicalY = (cssY / 400.0) * 2.0 - 1.0;

                // Map CSS [0, 400] to Internal Canvas [0, 200]
                pointerCanvasX = (cssX / 400.0) * gridSize;
                pointerCanvasY = (cssY / 400.0) * gridSize;

                // Optional: Ignore clicks outside the circle bounds
                if (pointerPhysicalX * pointerPhysicalX + pointerPhysicalY * pointerPhysicalY > 1.0) return;

                isTapping = true;
                tapStartTime = performance.now();
                canvas.setPointerCapture(event.pointerId); // Keep tracking if pointer leaves bounds slightly
            });

            // 2. Pointer Up (Release & Inject)
            canvas.addEventListener('pointerup', function (event) {
                if (!isTapping) return;
                isTapping = false;

                const durationSec = (performance.now() - tapStartTime) / 1000.0;
                let finalSigma = MIN_SIGMA + (durationSec * SIGMA_GROWTH_RATE);
                finalSigma = Math.min(finalSigma, MAX_SIGMA); // Clamp to max

                // Inject into the WebAssembly engine
                well.createWavepacket(pointerPhysicalX, pointerPhysicalY, finalSigma);
                canvas.releasePointerCapture(event.pointerId);
            });

            // 3. Pointer Cancel (e.g. phone call comes in, or dragging off screen)
            canvas.addEventListener('pointercancel', function () {
                isTapping = false;
            });


            // --- Rendering State ---
            let lastTime = performance.now();
            let frameCount = 0;

            function renderLoop() {
                well.renderFrame(0.001); // dt

                const pointer = well.getBufferPointer();

                // Wrap a JS TypedArray view around the Wasm memory
                const pixelDataView = new Uint8ClampedArray(
                    HEAPU8.buffer,
                    pointer,
                    gridSize * gridSize * 4
                );

                // Push Wasm frame to the canvas (This wipes the canvas clean!)
                const imageData = new ImageData(pixelDataView, gridSize, gridSize);
                ctx.putImageData(imageData, 0, 0);

                // --- Draw Visual Feedback AFTER putImageData ---
                if (isTapping) {
                    const durationSec = (performance.now() - tapStartTime) / 1000.0;
                    let currentSigma = MIN_SIGMA + (durationSec * SIGMA_GROWTH_RATE);
                    currentSigma = Math.min(currentSigma, MAX_SIGMA);

                    // Convert physical sigma [-1 to 1] to a canvas pixel radius
                    // Since physical radius 1.0 = 100 canvas pixels (half of gridSize)
                    const radiusPx = currentSigma * (gridSize / 2);

                    ctx.beginPath();
                    ctx.arc(pointerCanvasX, pointerCanvasY, radiusPx, 0, 2 * Math.PI);

                    ctx.fillStyle = 'rgba(135, 206, 235, 0.95)';
                    // Draw the filled circle
                    ctx.fill();
                }

                // Calculate and update FPS
                const currentTime = performance.now();
                frameCount++;

                if (currentTime - lastTime >= 1000) {
                    fpsCounterElement.textContent = `FPS: ${frameCount}`;
                    frameCount = 0;
                    lastTime = currentTime;
                }

                requestAnimationFrame(renderLoop);
            }

            // Start the loop immediately upon initialization
            renderLoop();
        };

    </script>
</body>

</html>
